<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 웹 RPG - 게임 포트폴리오</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #00d4ff; margin-bottom: 10px; }
        .info { margin-bottom: 15px; color: #aaa; }
        canvas {
            border: 2px solid #00d4ff;
            border-radius: 8px;
            background: #16213e;
        }
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }
        .btn {
            width: 60px; height: 60px;
            background: #0f3460;
            border: 1px solid #00d4ff;
            color: #fff;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            user-select: none;
        }
        .btn:active { background: #00d4ff; color: #000; }
        .btn-empty { visibility: hidden; }
        .stats {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        .stat-box {
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 6px;
        }
        .stat-box span { color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>⚔️ 미니 웹 RPG</h1>
    <p class="info">키보드 방향키 / 터치 조작 — JavaScript + HTML5 Canvas</p>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <div class="controls">
        <div class="btn-empty"></div>
        <button class="btn" id="btnUp">↑</button>
        <div class="btn-empty"></div>
        <button class="btn" id="btnLeft">←</button>
        <button class="btn" id="btnDown">↓</button>
        <button class="btn" id="btnRight">→</button>
    </div>
    
    <div class="stats">
        <div class="stat-box">점수: <span id="score">0</span></div>
        <div class="stat-box">챔: <span id="hp">100</span></div>
        <div class="stat-box">스테이지: <span id="stage">1</span></div>
    </div>

    <script>
        // ===== 게임 엔진 코드 (JavaScript) =====
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 게임 상태
        const game = {
            score: 0,
            hp: 100,
            stage: 1,
            isOver: false,
            keys: {}
        };
        
        // 플레이어 오브젝트
        const player = {
            x: 300, y: 200,
            size: 20,
            speed: 4,
            color: '#00d4ff',
            direction: 'down'
        };
        
        // 적 배열
        let enemies = [];
        let items = [];
        
        // ===== 입력 처리 =====
        window.addEventListener('keydown', e => game.keys[e.key] = true);
        window.addEventListener('keyup', e => game.keys[e.key] = false);
        
        // 터치 버튼
        const setBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', e => { e.preventDefault(); game.keys[key] = true; });
            btn.addEventListener('touchend', e => { e.preventDefault(); game.keys[key] = false; });
            btn.addEventListener('mousedown', () => game.keys[key] = true);
            btn.addEventListener('mouseup', () => game.keys[key] = false);
        };
        setBtn('btnUp', 'ArrowUp');
        setBtn('btnDown', 'ArrowDown');
        setBtn('btnLeft', 'ArrowLeft');
        setBtn('btnRight', 'ArrowRight');
        
        // ===== 업데이트 루프 =====
        function update() {
            if (game.isOver) return;
            
            // 플레이어 이동
            if (game.keys['ArrowUp'] || game.keys['w']) player.y -= player.speed;
            if (game.keys['ArrowDown'] || game.keys['s']) player.y += player.speed;
            if (game.keys['ArrowLeft'] || game.keys['a']) player.x -= player.speed;
            if (game.keys['ArrowRight'] || game.keys['d']) player.x += player.speed;
            
            // 화면 경계 제한
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));
            
            // 적 생성 (가끔)
            if (Math.random() < 0.02 && enemies.length < 3 + game.stage) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() < 0.5 ? -20 : canvas.height + 20,
                    size: 18,
                    speed: 1.5 + game.stage * 0.3,
                    color: '#ff4757'
                });
            }
            
            // 아이템 생성
            if (Math.random() < 0.005 && items.length < 2) {
                items.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    size: 10,
                    color: '#2ed573',
                    type: 'heal'
                });
            }
            
            // 적 이동 + 충돌
            enemies.forEach((enemy, i) => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > 0) {
                    enemy.x += (dx/dist) * enemy.speed;
                    enemy.y += (dy/dist) * enemy.speed;
                }
                
                // 충돌 검사
                if (dist < player.size + enemy.size) {
                    game.hp -= 10;
                    enemies.splice(i, 1);
                    if (game.hp <= 0) gameOver();
                }
            });
            
            // 아이템 획득
            items.forEach((item, i) => {
                const dx = player.x - item.x;
                const dy = player.y - item.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < player.size + item.size) {
                    if (item.type === 'heal') {
                        game.hp = Math.min(100, game.hp + 20);
                        game.score += 50;
                    }
                    items.splice(i, 1);
                }
            });
            
            // 스테이지 클리어 (점수 500점 당)
            if (game.score >= game.stage * 500) {
                game.stage++;
                game.hp = 100;
                enemies = [];
                items = [];
            }
            
            updateUI();
        }
        
        // ===== 렌더링 =====
        function draw() {
            // 배경
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 그리드
            ctx.strokeStyle = '#1a1a3e';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
            
            // 아이템
            items.forEach(item => {
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();
            });
            
            // 적
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x - enemy.size, enemy.y - enemy.size, enemy.size*2, enemy.size*2);
                // 눈
                ctx.fillStyle = '#fff';
                ctx.fillRect(enemy.x - 5, enemy.y - 8, 4, 4);
                ctx.fillRect(enemy.x + 1, enemy.y - 8, 4, 4);
            });
            
            // 플레이어
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();
            // 방패
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(player.x - 15, player.y + 10, 30, 8);
            
            // 게임 오버 텍스트
            if (game.isOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff4757';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '20px sans-serif';
                ctx.fillText(`최종 점수: ${game.score}`, canvas.width/2, canvas.height/2 + 20);
                ctx.fillText('공간키 눌러 재시작', canvas.width/2, canvas.height/2 + 50);
            }
        }
        
        function updateUI() {
            document.getElementById('score').textContent = game.score;
            document.getElementById('hp').textContent = game.hp;
            document.getElementById('stage').textContent = game.stage;
        }
        
        function gameOver() {
            game.isOver = true;
            // 서버에 점수 전송 (올렘 가능)
            // fetch('http://localhost:5000/api/score', { ... });
        }
        
        function reset() {
            game.score = 0; game.hp = 100; game.stage = 1;
            game.isOver = false;
            player.x = 300; player.y = 200;
            enemies = []; items = [];
        }
        
        window.addEventListener('keydown', e => {
            if (e.code === 'Space' && game.isOver) reset();
        });
        
        // ===== 게임 루프 =====
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
